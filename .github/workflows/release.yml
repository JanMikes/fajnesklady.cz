# Release — build the image once per env and deploy to lily via the shared
# reusable workflow (TheDevs-cz/ci). No more SSH-to-spare: each job calls
# `_ship.yml`, which builds+pushes ghcr.io/janmikes/fajnesklady.cz and then
# HMAC-POSTs https://deploy.lily.srv.thedevs.cz/hooks/<app> (per-app secret).
#
# Both envs run the SAME image; staging vs production differs only by the .env
# rendered from each app's Infisical project on the box (lily.srv).
#
# Trigger: only after the `Tests` workflow succeeds on main (keeps the
# tests-must-pass gate the old SSH pipeline had). Staging deploys first, then
# production (needs: ship-staging) — the original ordering.
#
# Secrets (set on this repo): DEPLOY_WEBHOOK_SECRET (production HMAC key) and
# DEPLOY_WEBHOOK_SECRET_STAGING (staging HMAC key). Passed EXPLICITLY because
# the reusable workflow lives under a different owner (secrets: inherit can't
# cross owners).

name: Release

on:
    workflow_run:
        workflows: [Tests]
        types:
            - completed
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    ship-staging:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: TheDevs-cz/ci/.github/workflows/_ship.yml@v1
        secrets:
            DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET_STAGING }}
        with:
            app: fajnesklady-staging
            image: ghcr.io/janmikes/fajnesklady.cz
            deploy_host: lily.srv.thedevs.cz
            build_args: APP_VERSION=${{ github.event.workflow_run.head_sha }}
            await_deploy: false

    ship-production:
        needs: ship-staging
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: TheDevs-cz/ci/.github/workflows/_ship.yml@v1
        secrets:
            DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        with:
            app: fajnesklady
            image: ghcr.io/janmikes/fajnesklady.cz
            deploy_host: lily.srv.thedevs.cz
            build_args: APP_VERSION=${{ github.event.workflow_run.head_sha }}
            await_deploy: false
